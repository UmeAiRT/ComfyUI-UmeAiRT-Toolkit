name: CI Tests
on:
  push:
    branches: [main, develop]
    paths:
      - 'modules/**'
      - 'tests/**'
      - 'web/**'
      - '__init__.py'
      - 'requirements.txt'
      - 'pyproject.toml'
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install colorama opencv-python-headless tqdm scipy psutil safetensors
      
      - name: Run tests (no ComfyUI runtime)
        run: |
          echo "=== test_common ==="
          python tests/test_common.py -v
          echo "=== test_traversal ==="
          python tests/test_traversal.py -v
          echo "=== test_optimization ==="
          python tests/test_optimization.py -v
          echo "=== test_block_inputs ==="
          python tests/test_block_inputs.py -v
          echo "=== test_tooltips ==="
          python tests/test_tooltips.py -v
          echo "=== test_registration ==="
          python tests/test_registration.py -v
