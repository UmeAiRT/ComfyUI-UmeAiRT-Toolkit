name: CI Tests
on:
  push:
    branches: [main, develop]
    paths:
      - 'modules/**'
      - 'tests/**'
      - 'web/**'
      - '__init__.py'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/**'
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install opencv-python-headless Pillow
          pip install -r requirements.txt
      
      - name: test_common
        run: python tests/test_common.py -v

      - name: test_traversal
        run: python tests/test_traversal.py -v

      - name: test_optimization
        run: python tests/test_optimization.py -v

      - name: test_block_inputs
        run: python tests/test_block_inputs.py -v

      - name: test_tooltips
        run: python tests/test_tooltips.py -v

      - name: test_registration
        run: python tests/test_registration.py -v

      - name: test_smoke
        run: python tests/test_smoke.py -v
